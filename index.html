<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knutsel Ideeën</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>Knutsel Ideeën</h1>
    <p>Zoek tussen 100 simpele knutselideeën of laat je verrassen met een random idee.</p>
  </header>

  <main class="container">
    <section class="controls">
      <input id="searchInput" type="text" placeholder="Zoek op naam, materiaal of type..." />
      <button id="randomBtn">🎲 Random idee</button>
    </section>

    <section id="featuredIdea" class="featured hidden"></section>

    <section>
      <h2>Alle ideeën</h2>
      <div id="resultsCount" class="results-count"></div>
      <div id="ideasGrid" class="ideas-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>Gemaakt voor simpele en leuke knutsels.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
